<div class="mb-10">
  <h2 class="text-3xl font-extrabold text-white mb-2">Bookmarked Chapters</h2>
  <p class="text-text-muted text-base font-normal">Revisit specific reading topics you saved during your studies.</p>
</div>

<!-- Bookmarks Grid -->
<div *ngIf="bookmarkedChapters.length > 0; else noBookmarks" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
  <div *ngFor="let bm of bookmarkedChapters" class="glass-panel p-6 rounded-2xl border border-white/5 flex flex-col justify-between hover:border-primary/40 transition-all duration-300 card-hover-effect">
    <div>
      <span class="text-[10px] text-primary-light font-bold uppercase tracking-wider">{{ bm.courseTitle }}</span>
      <h4 class="font-extrabold text-white text-base mt-2 mb-6 leading-snug">{{ bm.title }}</h4>
    </div>

    <div class="flex items-center justify-between border-t border-surface-border/50 pt-4">
      <button (click)="removeBookmark(bm.id)" class="text-xs font-semibold text-red-400 hover:text-red-300 transition-colors">
        Remove
      </button>
      
      <a [routerLink]="['/dashboard/ebook', bm.id]" class="px-4 py-2 rounded-xl bg-primary hover:bg-primary-light font-bold text-xs text-white transition-all">
        Study Now
      </a>
    </div>
  </div>
</div>

<ng-template #noBookmarks>
  <div class="glass-panel p-12 rounded-3xl border border-white/5 text-center max-w-xl mx-auto mt-12">
    <span class="text-4xl">📌</span>
    <h3 class="text-xl font-bold text-white mt-4 mb-2">No Bookmarks Saved</h3>
    <p class="text-text-muted text-sm leading-relaxed">Pin study chapters in the Digital E-Book Reader to quickly catalog them here.</p>
  </div>
</ng-template>
