<div class="min-h-screen bg-background text-text flex flex-col md:flex-row relative">
  <!-- MOBILE TOP BAR -->
  <header class="md:hidden flex items-center justify-between px-6 h-16 bg-surface border-b border-surface-border sticky top-0 z-40">
    <div class="flex items-center gap-3">
      <div class="h-8 w-8 rounded-lg bg-gradient-to-tr from-primary to-secondary flex items-center justify-center">
        <span class="font-extrabold text-white text-sm">C</span>
      </div>
      <span class="font-bold text-lg text-white">CodeMaster</span>
    </div>
    <button (click)="toggleSidebar()" class="p-2 rounded-lg text-text-muted hover:text-white hover:bg-surface-light focus:outline-none">
      <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
      </svg>
    </button>
  </header>

  <!-- SIDEBAR SHELL -->
  <!-- Mobile Drawer Backdrop -->
  <div *ngIf="sidebarOpen" (click)="closeSidebar()" class="fixed inset-0 z-40 bg-black/60 md:hidden backdrop-blur-sm"></div>

  <!-- Sidebar panel -->
  <aside 
    [ngClass]="{
      'translate-x-0': sidebarOpen, 
      '-translate-x-full md:translate-x-0': !sidebarOpen
    }"
    class="w-64 bg-surface border-r border-surface-border flex flex-col justify-between fixed md:sticky top-0 h-screen z-50 transition-transform duration-300 ease-in-out md:translate-x-0"
  >
    <div>
      <!-- Brand Header -->
      <div class="h-20 flex items-center gap-3 px-6 border-b border-surface-border">
        <div class="h-9 w-9 rounded-xl bg-gradient-to-tr from-primary to-secondary flex items-center justify-center">
          <span class="font-extrabold text-white text-base">C</span>
        </div>
        <span class="font-bold text-xl text-white">CodeMaster</span>
      </div>

      <!-- Navigation links -->
      <nav class="p-4 space-y-1.5 overflow-y-auto max-h-[calc(100vh-140px)]">
        <a 
          *ngFor="let item of navItems" 
          [routerLink]="item.path"
          [routerLinkActiveOptions]="{exact: item.exact}"
          routerLinkActive="bg-primary/10 border-primary text-primary"
          (click)="closeSidebar()"
          class="flex items-center gap-3 px-4 py-3 rounded-xl border border-transparent text-sm font-semibold text-text-muted hover:text-text hover:bg-surface-light transition-all"
        >
          <!-- SVG Icons Map -->
          <svg *ngIf="item.icon === 'home'" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>
          <svg *ngIf="item.icon === 'book'" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>
          <svg *ngIf="item.icon === 'target'" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
          <svg *ngIf="item.icon === 'trophy'" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v13m0-13V6a2 2 0 112 2h-2zm0 0V5a2 2 0 10-2 2h2zm-2 4h4M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8" /></svg>
          <svg *ngIf="item.icon === 'terminal'" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
          <svg *ngIf="item.icon === 'bookmark'" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z" /></svg>
          <svg *ngIf="item.icon === 'edit'" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>
          <svg *ngIf="item.icon === 'award'" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 115.656 0M9 21h6" /></svg>
          <svg *ngIf="item.icon === 'user'" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
          <svg *ngIf="item.icon === 'settings'" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
          
          {{ item.label }}
        </a>
      </nav>
    </div>

    <!-- User Profile Footer block -->
    <div class="p-4 border-t border-surface-border flex items-center justify-between gap-3">
      <div class="flex items-center gap-3 overflow-hidden">
        <img [src]="user?.avatar_url || 'https://api.dicebear.com/7.x/bottts/svg?seed=Guest'" alt="Avatar" class="h-10 w-10 rounded-xl bg-slate-800 border border-surface-border">
        <div class="overflow-hidden">
          <div class="text-sm font-bold text-white truncate">{{ user?.full_name || 'Scholar' }}</div>
          <div class="text-[10px] text-text-muted font-semibold uppercase tracking-wider">{{ user?.level || 'Beginner' }}</div>
        </div>
      </div>
      <button (click)="logout()" class="p-2 rounded-xl text-text-muted hover:text-red-400 hover:bg-red-500/10 transition-all focus:outline-none" title="Log Out">
        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
        </svg>
      </button>
    </div>
  </aside>

  <!-- MAIN CONTENT CONTAINER -->
  <div class="flex-1 flex flex-col min-h-screen overflow-x-hidden">
    <!-- DESKTOP TOP HEADER -->
    <header class="hidden md:flex items-center justify-between px-8 h-20 bg-surface/30 border-b border-surface-border/60 sticky top-0 z-30 backdrop-blur-md">
      <h1 class="text-xl font-bold text-white">Coding Arena</h1>
      
      <!-- Gamification Stat Pills -->
      <div class="flex items-center gap-4">
        <!-- Streak -->
        <div class="flex items-center gap-2 px-3 py-1.5 rounded-xl bg-orange-500/10 border border-orange-500/30 text-orange-400 text-sm font-bold" title="Daily Streak">
          <span>🔥</span> {{ user?.current_streak || 0 }} Days
        </div>
        <!-- XP -->
        <div class="flex items-center gap-2 px-3 py-1.5 rounded-xl bg-secondary/10 border border-secondary/30 text-secondary-light text-sm font-bold" title="Accumulated XP">
          <span>✨</span> {{ user?.xp || 0 }} XP
        </div>
        <!-- Level -->
        <div class="flex items-center gap-2 px-3 py-1.5 rounded-xl bg-accent/10 border border-accent/30 text-accent-light text-sm font-bold" title="Current Rank Level">
          <span>🏆</span> {{ user?.level || 'Beginner' }}
        </div>
      </div>
    </header>

    <!-- CONTENT OUTLET -->
    <main class="flex-1 p-6 md:p-8">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
