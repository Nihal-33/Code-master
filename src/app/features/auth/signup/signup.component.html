<div class="min-h-screen flex items-center justify-center py-12 px-6 relative overflow-hidden bg-background">
  <!-- Decorative background elements -->
  <div class="absolute -top-32 -left-32 w-96 h-96 bg-primary/20 rounded-full blur-3xl animate-pulse-slow"></div>
  <div class="absolute -bottom-32 -right-32 w-96 h-96 bg-secondary/15 rounded-full blur-3xl animate-pulse-slow"></div>

  <div class="w-full max-w-md relative z-10">
    <!-- Brand Logo -->
    <div class="text-center mb-8">
      <a routerLink="/landing" class="inline-flex items-center gap-3">
        <div class="h-10 w-10 rounded-xl bg-gradient-to-tr from-primary to-secondary flex items-center justify-center shadow-lg shadow-primary/30">
          <span class="font-extrabold text-white text-xl">C</span>
        </div>
        <span class="font-bold text-2xl tracking-tight text-white">CodeMaster</span>
      </a>
      <h2 class="text-xl text-text-muted mt-3">Start learning and tracking progress.</h2>
    </div>

    <!-- Signup Card -->
    <div class="glass-panel p-8 md:p-10 rounded-3xl border border-white/10 shadow-2xl">
      <form [formGroup]="signupForm" (ngSubmit)="onSubmit()" class="space-y-5">
        
        <!-- Alerts -->
        <div *ngIf="error" class="p-4 rounded-xl bg-red-500/10 border border-red-500/30 text-red-200 text-sm">
          {{ error }}
        </div>
        <div *ngIf="successMsg" class="p-4 rounded-xl bg-green-500/10 border border-green-500/30 text-green-200 text-sm">
          {{ successMsg }}
        </div>

        <div>
          <label class="block text-sm font-semibold text-text mb-1.5">Full Name</label>
          <input 
            type="text" 
            formControlName="fullName" 
            placeholder="John Doe"
            class="w-full px-4 py-3.5 rounded-xl bg-surface border border-surface-border text-white placeholder-text-muted/50 focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all text-sm"
            [ngClass]="{'border-red-500/50': f['fullName'].touched && f['fullName'].invalid}"
          />
          <div *ngIf="f['fullName'].touched && f['fullName'].invalid" class="text-red-400 text-xs mt-1.5 font-medium">
            Please enter your name.
          </div>
        </div>

        <div>
          <label class="block text-sm font-semibold text-text mb-1.5">Email Address</label>
          <input 
            type="email" 
            formControlName="email" 
            placeholder="name@domain.com"
            class="w-full px-4 py-3.5 rounded-xl bg-surface border border-surface-border text-white placeholder-text-muted/50 focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all text-sm"
            [ngClass]="{'border-red-500/50': f['email'].touched && f['email'].invalid}"
          />
          <div *ngIf="f['email'].touched && f['email'].invalid" class="text-red-400 text-xs mt-1.5 font-medium">
            Please supply a valid email address.
          </div>
        </div>

        <div>
          <label class="block text-sm font-semibold text-text mb-1.5">Password</label>
          <input 
            type="password" 
            formControlName="password" 
            placeholder="••••••••"
            class="w-full px-4 py-3.5 rounded-xl bg-surface border border-surface-border text-white placeholder-text-muted/50 focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all text-sm"
            [ngClass]="{'border-red-500/50': f['password'].touched && f['password'].invalid}"
          />
          <div *ngIf="f['password'].touched && f['password'].invalid" class="text-red-400 text-xs mt-1.5 font-medium">
            Password must contain at least 6 characters.
          </div>
        </div>

        <button 
          type="submit" 
          [disabled]="signupForm.invalid || loading"
          class="w-full py-4 rounded-xl bg-gradient-to-r from-primary to-secondary text-white font-bold text-sm tracking-wide shadow-xl shadow-primary/20 disabled:opacity-50 disabled:cursor-not-allowed transition-all flex items-center justify-center gap-2 mt-2"
        >
          <svg *ngIf="loading" class="animate-spin h-5 w-5 text-white" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
          {{ loading ? 'Creating Account...' : 'Create Account' }}
        </button>
      </form>

      <!-- Social Logins Divider -->
      <div class="relative my-7 text-center">
        <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-surface-border"></div></div>
        <span class="relative bg-[#111827] px-3.5 text-xs text-text-muted uppercase tracking-wider">Or continue with</span>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <button (click)="loginWithProvider('google')" type="button" class="flex items-center justify-center gap-2.5 py-3 rounded-xl border border-surface-border bg-surface hover:bg-surface-light transition-all text-xs font-semibold text-white">
          <svg class="h-4.5 w-4.5" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/></svg>
          Google
        </button>
        <button (click)="loginWithProvider('github')" type="button" class="flex items-center justify-center gap-2.5 py-3 rounded-xl border border-surface-border bg-surface hover:bg-surface-light transition-all text-xs font-semibold text-white">
          <svg class="h-4.5 w-4.5" viewBox="0 0 24 24" fill="currentColor"><path fill-rule="evenodd" clip-rule="evenodd" d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.464-1.11-1.464-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.579.688.481C19.137 20.162 22 16.418 22 12c0-5.523-4.477-10-10-10z"/></svg>
          GitHub
        </button>
      </div>
    </div>

    <!-- Switch to Login Link -->
    <div class="text-center mt-6 text-sm text-text-muted">
      Already have an account? <a routerLink="/login" class="text-primary font-semibold hover:text-primary-light transition-colors">Sign in here</a>.
    </div>
  </div>
</div>
