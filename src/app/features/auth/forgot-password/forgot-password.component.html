<div class="min-h-screen flex items-center justify-center py-12 px-6 relative overflow-hidden bg-background">
  <!-- Decorative background elements -->
  <div class="absolute -top-32 -left-32 w-96 h-96 bg-primary/20 rounded-full blur-3xl animate-pulse-slow"></div>
  <div class="absolute -bottom-32 -right-32 w-96 h-96 bg-secondary/15 rounded-full blur-3xl animate-pulse-slow"></div>

  <div class="w-full max-w-md relative z-10">
    <!-- Brand Logo -->
    <div class="text-center mb-8">
      <a routerLink="/landing" class="inline-flex items-center gap-3">
        <div class="h-10 w-10 rounded-xl bg-gradient-to-tr from-primary to-secondary flex items-center justify-center shadow-lg shadow-primary/30">
          <span class="font-extrabold text-white text-xl">C</span>
        </div>
        <span class="font-bold text-2xl tracking-tight text-white">CodeMaster</span>
      </a>
      <h2 class="text-xl text-text-muted mt-3">Reset your account password.</h2>
    </div>

    <!-- Recovery Card -->
    <div class="glass-panel p-8 md:p-10 rounded-3xl border border-white/10 shadow-2xl">
      <form [formGroup]="recoveryForm" (ngSubmit)="onSubmit()" class="space-y-6">
        
        <!-- Alerts -->
        <div *ngIf="error" class="p-4 rounded-xl bg-red-500/10 border border-red-500/30 text-red-200 text-sm">
          {{ error }}
        </div>
        <div *ngIf="successMsg" class="p-4 rounded-xl bg-green-500/10 border border-green-500/30 text-green-200 text-sm">
          {{ successMsg }}
        </div>

        <div>
          <label class="block text-sm font-semibold text-text mb-2">Registered Email</label>
          <input 
            type="email" 
            formControlName="email" 
            placeholder="name@domain.com"
            class="w-full px-4 py-3.5 rounded-xl bg-surface border border-surface-border text-white placeholder-text-muted/50 focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all text-sm"
            [ngClass]="{'border-red-500/50': f['email'].touched && f['email'].invalid}"
          />
          <div *ngIf="f['email'].touched && f['email'].invalid" class="text-red-400 text-xs mt-1.5 font-medium">
            Please enter a valid email address.
          </div>
        </div>

        <button 
          type="submit" 
          [disabled]="recoveryForm.invalid || loading"
          class="w-full py-4 rounded-xl bg-primary hover:bg-primary-light text-white font-bold text-sm tracking-wide shadow-xl shadow-primary/20 disabled:opacity-50 disabled:cursor-not-allowed transition-all flex items-center justify-center gap-2"
        >
          <svg *ngIf="loading" class="animate-spin h-5 w-5 text-white" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
          {{ loading ? 'Sending link...' : 'Send Recovery Link' }}
        </button>
      </form>
    </div>

    <!-- Return to Login -->
    <div class="text-center mt-6 text-sm text-text-muted">
      Remember password? <a routerLink="/login" class="text-primary font-semibold hover:text-primary-light transition-colors">Sign in here</a>.
    </div>
  </div>
</div>
